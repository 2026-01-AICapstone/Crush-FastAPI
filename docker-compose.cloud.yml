services:
  ai-server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    ports:
      - "8000:8000"
    environment:
      - MODEL_MODE=cloud
    volumes:
      - hf_cache:/app/.cache/huggingface  # 모델 캐시 유지 (재시작 시 재다운로드 방지)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
